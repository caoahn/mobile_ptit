# Development docker-compose: run Redis + Celery worker in Docker.
# API should run on host machine with uvicorn.
services:
  redis:
    image: redis:7-alpine
    container_name: yolo-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - yolo-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.txt
    container_name: yolo-worker-dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - REDIS_URL=redis://redis:6379/0
      - MODEL_PATH=/app/models/yolo11n.pt
      - CELERY_TASK_TIME_LIMIT=300
      - CELERY_RESULT_EXPIRES=3600
      - DEBUG=True
      - LOG_LEVEL=DEBUG
      - YOLO_CONFIG_DIR=/tmp/Ultralytics
      - TRANSFORMERS_CACHE=/cache/hf
    volumes:
      - .:/app
      - ./models:/app/models:ro
      - ./logs:/app/logs
      - ./temp:/app/temp
      - hf-cache-dev:/cache/hf
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A services.celery_app.celery_app worker --queues=detection_jobs,embedding_jobs --loglevel=info --concurrency=2
    restart: unless-stopped
    networks:
      - yolo-network

volumes:
  redis-data-dev:
    driver: local
  hf-cache-dev:
    driver: local

networks:
  yolo-network:
    driver: bridge
