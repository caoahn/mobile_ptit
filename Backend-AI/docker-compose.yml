services:
  # =========================
  # Redis
  # =========================
  redis:
    image: redis:7-alpine
    container_name: yolo-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - yolo-network

  # =========================
  # FastAPI (API server)
  # =========================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yolo-api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: /app/models/best.pt
      CONFIDENCE_THRESHOLD: 0.25
      IOU_THRESHOLD: 0.45
      MAX_WORKERS: 2
      JOB_TIMEOUT: 180
      TEMP_DIR: /app/temp
      LOGS_DIR: /app/logs
      LOG_LEVEL: INFO
      YOLO_CONFIG_DIR: /tmp/Ultralytics
      TRANSFORMERS_CACHE: /cache/hf
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
      - ./temp:/app/temp
      - ./uploads:/app/uploads
      - hf-cache:/cache/hf # 🔥 cache ngoài container
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - yolo-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================
  # Worker (RQ)
  # =========================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-worker.txt
    environment:
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: /app/models/best.pt
      CONFIDENCE_THRESHOLD: 0.25
      IOU_THRESHOLD: 0.45
      REDIS_JOB_TIMEOUT: 300
      TEMP_DIR: /app/temp
      LOGS_DIR: /app/logs
      LOG_LEVEL: INFO
      YOLO_CONFIG_DIR: /tmp/Ultralytics
      TRANSFORMERS_CACHE: /cache/hf
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
      - ./temp:/app/temp
      - hf-cache:/cache/hf
    depends_on:
      redis:
        condition: service_healthy
    command: python worker.py
    restart: unless-stopped
    networks:
      - yolo-network

volumes:
  redis-data:
  hf-cache:
    # 🔥 tránh cache làm phình image

networks:
  yolo-network:
    driver: bridge
